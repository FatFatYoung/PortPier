name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write          # 允许创建 Release 和上传附件

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build Server
      run: |
        cd server
        pyinstaller --onefile --windowed --name "portpier_server" `
          --exclude-module aiohttp `
          --exclude-module numpy `
          --exclude-module PIL `
          --exclude-module pillow `
          --exclude-module matplotlib `
          --exclude-module pandas `
          --exclude-module scipy `
          gui_server.py

    - name: Build Client
      run: |
        cd client
        pyinstaller --onefile --windowed --name "portpier_client" `
          --exclude-module aiohttp `
          --exclude-module numpy `
          --exclude-module PIL `
          --exclude-module pillow `
          --exclude-module matplotlib `
          --exclude-module pandas `
          --exclude-module scipy `
          gui_client.py

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          server/dist/portpier_server.exe
          client/dist/portpier_client.exe
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}   # 明确传递 token（v2 推荐写法）
